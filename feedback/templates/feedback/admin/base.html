{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f2ed">
    <meta name="color-scheme" content="light">
    <title>{% block title %}Imperial Club — Reviewer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'feedback/css/home.css' %}">
</head>
<body class="admin-body">
    {% if user_master %}
        <header class="admin-topbar">
            <div class="admin-topbar-inner">
                <a class="admin-brand" href="{% url 'admin-dashboard' %}">
                    <img class="admin-brand-logo" src="{% static 'feedback/images/theimperialclubtransparent.png' %}" alt="The Imperial Club logo">
                    <span class="admin-brand-text">Reviewer Console</span>
                </a>
                <div class="admin-user">
                    <span class="admin-user-name">{{ user_master.full_name|default:user_master.username }}</span>
                    <a class="admin-link" href="{% url 'admin-logout' %}">Logout</a>
                </div>
            </div>
        </header>
    {% endif %}

    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
